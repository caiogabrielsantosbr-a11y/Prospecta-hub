<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0A0A0A;
      color: #e0e0e0;
      font-family: "Inter", sans-serif;
      padding: 24px 20px;
      font-size: 13px;
      min-height: 100vh;
    }

    /* Logo */
    .logo-container {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-img {
      width: 180px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* Card */
    .card {
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin-bottom: 10px;
    }

    /* Quota */
    .quota-number {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      color: #00D26A;
      text-align: center;
    }

    .quota-number.low {
      color: #E8593C;
    }

    .quota-sub {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 6px;
    }

    /* Status Badge */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-label {
      font-size: 12px;
      color: #999;
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-on {
      background: #003D1F;
      color: #00D26A;
      border: 1px solid #00D26A33;
    }

    .badge-off {
      background: #1A1A1A;
      color: #666;
      border: 1px solid #2A2A2A;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge-on .dot {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* Webhook URL */
    .webhook-container {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .webhook-url {
      flex: 1;
      font-size: 11px;
      color: #999;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      line-height: 1.4;
    }

    .copy-btn {
      background: #2A2A2A;
      border: 1px solid #333;
      color: #999;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .copy-btn:hover {
      background: #333;
      border-color: #444;
      color: #fff;
    }

    .copy-btn.copied {
      background: #003D1F;
      border-color: #00D26A33;
      color: #00D26A;
    }

    /* Button */
    .open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e8593c 0%, #c4185a 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 12px rgba(232, 89, 60, 0.3);
    }

    .open-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(232, 89, 60, 0.4);
    }

    .open-btn:active {
      transform: translateY(0);
    }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 12px;
      line-height: 1.5;
    }

    .error-msg {
      font-size: 11px;
      color: #E8593C;
      text-align: center;
      margin-top: 8px;
      display: none;
    }

    .loading {
      text-align: center;
      color: #666;
      font-size: 12px;
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- Logo -->
  <div class="logo-container">
    <img src="https://i.imgur.com/vB9YXUj.png" alt="Prospecta" class="logo-img">
  </div>

  <!-- Cota Gmail -->
  <div class="card">
    <div class="card-title">Cota Gmail Hoje</div>
    <div id="quotaDisplay" class="quota-number">...</div>
    <div class="quota-sub">emails disponíveis</div>
  </div>

  <!-- Status da Integração -->
  <div class="card">
    <div class="card-title">Integração Prospecta</div>
    <div class="status-row">
      <span class="status-label">Status do Robô</span>
      <span id="scheduleBadge" class="badge badge-off">
        <span class="dot"></span>INATIVO
      </span>
    </div>
  </div>

  <!-- Webhook URL -->
  <div class="card">
    <div class="card-title">URL do Webhook</div>
    <div class="webhook-container">
      <div id="webhookUrl" class="webhook-url">Carregando...</div>
      <button id="copyBtn" class="copy-btn" onclick="copyWebhook()">Copiar</button>
    </div>
  </div>

  <!-- Botão Abrir Painel -->
  <a class="open-btn" href="https://prospecta-hub.vercel.app/leads" target="_blank">
    <span>↗</span> Abrir Painel Completo
  </a>

  <p class="hint">
    Gerencie planilhas, robô e agendamento no<br>
    <strong style="color:#666;">Painel Completo</strong>
  </p>

  <div id="errorMsg" class="error-msg">Não foi possível carregar os dados.</div>

  <script>
    let webhookUrlText = '';

    document.addEventListener('DOMContentLoaded', () => {
      loadData();
    });

    function loadData() {
      const quota = document.getElementById('quotaDisplay');
      const errMsg = document.getElementById('errorMsg');
      quota.innerText = '...';
      quota.className = 'quota-number';
      errMsg.style.display = 'none';

      // Load stats
      google.script.run
        .withSuccessHandler(stats => {
          // Quota
          const q = stats.quota_gmail !== undefined ? stats.quota_gmail : 0;
          quota.innerText = q;
          quota.className = 'quota-number' + (q > 85 ? '' : ' low');

          // Badge
          const badge = document.getElementById('scheduleBadge');
          const active = stats.schedule_active;
          badge.className = 'badge ' + (active ? 'badge-on' : 'badge-off');
          badge.innerHTML = `<span class="dot"></span>${active ? 'ATIVO' : 'INATIVO'}`;
        })
        .withFailureHandler((error) => {
          console.error('Erro ao carregar stats:', error);
          quota.innerText = '—';
          errMsg.style.display = 'block';
        })
        .handleGetStats();

      // Load webhook URL
      google.script.run
        .withSuccessHandler(url => {
          webhookUrlText = url;
          document.getElementById('webhookUrl').innerText = url;
        })
        .withFailureHandler(() => {
          document.getElementById('webhookUrl').innerText = 'Erro ao carregar URL';
        })
        .getWebhookUrl();
    }

    function copyWebhook() {
      const btn = document.getElementById('copyBtn');

      // Copy to clipboard
      const textarea = document.createElement('textarea');
      textarea.value = webhookUrlText;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();

      try {
        document.execCommand('copy');
        btn.innerText = '✓ Copiado';
        btn.classList.add('copied');

        setTimeout(() => {
          btn.innerText = 'Copiar';
          btn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        btn.innerText = 'Erro';
        setTimeout(() => {
          btn.innerText = 'Copiar';
        }, 2000);
      }

      document.body.removeChild(textarea);
    }
  </script>
</body>

</html>
