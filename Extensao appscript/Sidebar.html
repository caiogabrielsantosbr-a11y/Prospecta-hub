<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: "Inter", sans-serif;
      padding: 20px 16px;
      font-size: 13px;
      min-height: 100vh;
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .logo .pro { color: #0055ff; }
    .logo .specta { color: #fff; }
    .logo-sub {
      font-size: 10px;
      color: #555;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .quota-number {
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      color: #00d26a;
    }
    .quota-number.low { color: #E8593C; }
    .quota-sub {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-on  { background: #003d1f; color: #00d26a; border: 1px solid #00d26a33; }
    .badge-off { background: #1a1a1a; color: #555;    border: 1px solid #2a2a2a; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .badge-on .dot  { animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .stat-item {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px;
    }

    .stat-item .val {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .stat-item .val.green { color: #00d26a; }
    .stat-item .val.blue  { color: #6699ff; }
    .stat-item .val.red   { color: #E8593C; }

    .stat-item .lbl {
      font-size: 10px;
      color: #555;
      margin-top: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .progress-bar-wrap {
      background: #222;
      border-radius: 4px;
      height: 5px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0055ff, #00aaff);
      border-radius: 4px;
      transition: width 0.4s;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #555;
      margin-top: 4px;
    }

    .refresh-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      float: right;
      margin-top: -2px;
    }
    .refresh-btn:hover { border-color: #0055ff; color: #0055ff; }

    .open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      background: #0055ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .open-btn:hover { background: #0044cc; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 10px;
    }

    .error-msg {
      font-size: 11px;
      color: #E8593C;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="logo"><span class="pro">PRO</span><span class="specta">SPECTA</span></div>
  <div class="logo-sub">Prospecting Suite</div>

  <!-- QUOTA -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <div class="section-label">Cota Gmail Hoje</div>
        <div id="quotaDisplay" class="quota-number">...</div>
        <div class="quota-sub">emails disponíveis</div>
      </div>
      <div style="text-align:right;">
        <div class="section-label" style="margin-bottom:6px;">Robô</div>
        <span id="scheduleBadge" class="badge badge-off"><span class="dot"></span>INATIVO</span>
        <button class="refresh-btn" onclick="refreshStats()">↻</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-item">
        <div id="statTotal" class="val">—</div>
        <div class="lbl">Total</div>
      </div>
      <div class="stat-item">
        <div id="statSent" class="val green">—</div>
        <div class="lbl">Enviados</div>
      </div>
      <div class="stat-item">
        <div id="statPending" class="val blue">—</div>
        <div class="lbl">Pendentes</div>
      </div>
      <div class="stat-item">
        <div id="statErrors" class="val red">—</div>
        <div class="lbl">Erros</div>
      </div>
    </div>

    <!-- daily progress -->
    <div id="dailyWrap" style="margin-top:12px; display:none;">
      <div class="progress-bar-wrap">
        <div id="dailyBar" class="progress-bar-fill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="dailySentLabel">0 enviados hoje</span>
        <span id="dailyLimitLabel">limite: —</span>
      </div>
    </div>

    <div id="errorMsg" class="error-msg">Não foi possível carregar os dados.</div>
  </div>

  <!-- LINK PARA O PAINEL -->
  <a id="openPanelBtn" class="open-btn" href="https://prospecta-hub.vercel.app/leads" target="_blank">
    ↗ Abrir Painel Completo
  </a>

  <p class="hint">Gerencie planilhas, robô e agendamento em<br><strong style="color:#333;">prospecta-hub.vercel.app</strong></p>

  <script>
    document.addEventListener('DOMContentLoaded', () => { refreshStats(); });

    function refreshStats() {
      const quota = document.getElementById('quotaDisplay');
      const errMsg = document.getElementById('errorMsg');
      quota.innerText = '...';
      quota.className = 'quota-number';
      errMsg.style.display = 'none';

      google.script.run
        .withSuccessHandler(s => {
          // Quota
          const q = s.quota_gmail;
          quota.innerText = q;
          quota.className = 'quota-number' + (q > 85 ? '' : ' low');

          // Stats
          document.getElementById('statTotal').innerText   = s.total   ?? '—';
          document.getElementById('statSent').innerText    = s.sent    ?? '—';
          document.getElementById('statPending').innerText = s.pending ?? '—';
          document.getElementById('statErrors').innerText  = s.errors  ?? '—';

          // Badge
          const badge = document.getElementById('scheduleBadge');
          const active = s.schedule_active;
          badge.className = 'badge ' + (active ? 'badge-on' : 'badge-off');
          badge.innerHTML = `<span class="dot"></span>${active ? 'ATIVO' : 'INATIVO'}`;

          // Daily progress
          const dailySent  = s.daily_sent  ?? 0;
          const dailyLimit = s.daily_limit ?? 0;
          if (dailyLimit > 0) {
            const pct = Math.min(100, Math.round((dailySent / dailyLimit) * 100));
            document.getElementById('dailyBar').style.width = pct + '%';
            document.getElementById('dailySentLabel').innerText = dailySent + ' enviados hoje';
            document.getElementById('dailyLimitLabel').innerText = 'limite: ' + dailyLimit;
            document.getElementById('dailyWrap').style.display = 'block';
          }
        })
        .withFailureHandler(() => {
          quota.innerText = '—';
          errMsg.style.display = 'block';
        })
        .handleGetStats();
    }
  </script>
</body>
</html>
